# Publishes a GitHub Release when you push a version tag (semantic version: v1.2.3).
# Example: git tag -a v1.2.3 -m "Release" && git push origin v1.2.3
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release packages
        run: bash .github/scripts/build-release-assets.sh "$VERSION"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Office Auto Installer ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            Office-Auto-Installer-GUI-${{ env.VERSION }}.zip
            Office-Auto-Installer-Console-${{ env.VERSION }}.zip
            Office-Auto-Installer-Complete-${{ env.VERSION }}.zip
            office.ps1
            Install-Office.ps1
            Install-Office-GUI-WPF.ps1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
